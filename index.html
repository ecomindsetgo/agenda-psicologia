<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Psicología Pro+</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Hoja de estilos externa -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-800 min-h-screen flex flex-col pb-20 md:pb-6">

    <!-- ================= PANTALLA DE AUTENTICACIÓN ================= -->
    <div id="auth-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8 space-y-6 relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-50 rounded-full -z-10"></div>
            <div class="text-center space-y-2">
                <div class="inline-flex bg-indigo-100 p-3.5 rounded-2xl text-indigo-600 mb-2">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <h2 class="text-2xl font-black text-slate-800">Iniciar Sesión</h2>
                <p class="text-sm text-slate-500">Ingresa tus credenciales para acceder de forma segura a tu agenda médica.</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1.5">Correo Electrónico</label>
                    <input type="email" id="auth-email" placeholder="ejemplo@consultorio.com"
                        class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1.5">Contraseña</label>
                    <input type="password" id="auth-password" placeholder="••••••••"
                        class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition">
                </div>
                <div id="auth-error-msg" class="text-xs text-red-500 hidden font-semibold bg-red-50 p-3 rounded-lg border border-red-200"></div>
                <button id="auth-submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-md shadow-indigo-100 transition flex items-center justify-center gap-2">
                    <span>Entrar al Consultorio</span><span>➔</span>
                </button>
            </div>

            <div class="text-center space-y-3 pt-4 border-t border-slate-100">
                <button type="button" id="btn-forgot-password" class="text-xs text-slate-500 hover:text-indigo-600 transition underline">
                    ¿Olvidaste tu contraseña?
                </button>
            </div>
        </div>
    </div>

    <!-- ================= CONTENEDOR PRINCIPAL DE LA APP ================= -->
    <div id="app-container" class="hidden flex-col flex-grow">
        <header class="bg-indigo-900 text-white shadow-md sticky top-0 z-40 no-print">
            <div class="max-w-5xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-3">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-2.5 rounded-xl shadow-inner">
                        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="font-extrabold text-xl tracking-tight">Agenda Psicológica <span class="text-indigo-400 text-xs font-semibold px-2 py-0.5 bg-indigo-950/50 rounded-full border border-indigo-800 ml-1">Pro+</span></h1>
                        <p class="text-xs text-indigo-200 flex items-center gap-1.5 mt-0.5">
                            <span class="w-2.5 h-2.5 rounded-full bg-emerald-400 inline-block animate-pulse" id="sync-indicator-dot"></span>
                            <span id="sync-indicator-text" class="truncate max-w-[180px]">Conectado a la Nube</span>
                        </p>
                    </div>
                </div>
                <div class="flex items-center gap-3 w-full sm:w-auto justify-end">
                    <span id="current-date-lbl" class="text-sm bg-indigo-950/40 px-3.5 py-1.5 rounded-lg border border-indigo-800 font-medium"></span>
                    <button id="btn-open-print" class="bg-indigo-600 hover:bg-indigo-500 text-white font-medium px-3.5 py-1.5 rounded-lg shadow-sm transition flex items-center gap-2 text-sm">
                        <span>🖨️</span><span>Imprimir</span>
                    </button>
                    <button id="logout-btn" class="bg-red-950/50 hover:bg-red-900 border border-red-800/60 p-2 rounded-lg transition" title="Cerrar Sesión">🚪</button>
                </div>
            </div>
        </header>

        <!-- NAVEGACIÓN POR TABS -->
        <nav class="bg-white border-b border-slate-200 sticky top-[72px] sm:top-[76px] z-30 no-print shadow-sm">
            <div class="max-w-5xl mx-auto px-4 flex justify-around sm:justify-start sm:gap-6">
                <button id="tab-citas" class="py-3.5 px-3 border-b-2 border-indigo-600 text-indigo-600 font-semibold text-sm flex items-center gap-2 tab-transition">
                    🗓️ <span>Citas de Hoy</span>
                </button>
                <button id="tab-pacientes" class="py-3.5 px-3 border-b-2 border-transparent text-slate-500 hover:text-slate-800 font-medium text-sm flex items-center gap-2 tab-transition">
                    👥 <span>Directorio de Pacientes</span>
                </button>
                <button id="tab-finanzas" class="py-3.5 px-3 border-b-2 border-transparent text-slate-500 hover:text-slate-800 font-medium text-sm flex items-center gap-2 tab-transition">
                    📊 <span>Estadísticas y Finanzas</span>
                </button>
            </div>
        </nav>

        <!-- SECCIONES PRINCIPALES -->
        <main class="flex-grow max-w-5xl w-full mx-auto p-4 md:p-6 space-y-6 no-print">
            <section id="sec-citas" class="space-y-4">
                <!-- Contenido de citas (mantenido de tu versión original) -->
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-sm text-slate-500">Módulo de citas cargado correctamente mediante arquitectura modular.</p>
                </div>
            </section>
            <section id="sec-pacientes" class="space-y-4 hidden">
                <!-- Contenido de pacientes -->
            </section>
            <section id="sec-finanzas" class="space-y-6 hidden">
                <!-- Contenido de finanzas -->
            </section>
        </main>
    </div>

    <!-- Script Principal Modularizado -->
    <script type="module" src="app.js"></script>
</body>
</html>
